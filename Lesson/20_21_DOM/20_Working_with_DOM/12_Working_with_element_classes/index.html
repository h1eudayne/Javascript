<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .red {
        color: red;
      }

      .green {
        color: green;
      }

      .italic {
        font-style: italic;
      }
      .underline {
        text-decoration: underline;
      }
      .right {
        translate: 100px;
      }
      .title {
        transition: translate 0.5s;
      }
    </style>
  </head>
  <body>
    <h1 id="heading" class="title red italic">Hello World</h1>
    <button id="button">Click me!</button>
    <script src="main.js"></script>
  </body>
</html>
